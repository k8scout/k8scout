# ════════════════════════════════════════════════════════════════════════════
# CHAIN 8: WORKLOAD MUTATION (deployer-sa can patch deployments)
# ════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer-sa
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-manager
  namespace: prod
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer-deployment-access
  namespace: prod
subjects:
  - kind: ServiceAccount
    name: deployer-sa
    namespace: prod
roleRef:
  kind: Role
  name: deployment-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: ci-runner
  namespace: prod
  labels:
    app: ci-runner
spec:
  serviceAccountName: deployer-sa
  containers:
    - name: runner
      image: alpine
      command: ["/bin/sh", "-c", "sleep 36000"]
---
# Target deployment that deployer-sa can mutate
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: prod
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      serviceAccountName: cloud-sa
      containers:
        - name: payments
          image: payments-service:v2.1.0
          ports:
            - containerPort: 8080
          env:
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: stripe_key
---

# ════════════════════════════════════════════════════════════════════════════
# CHAIN 9: HOSTPATH CONTRAST (writable vs read-only)
# ════════════════════════════════════════════════════════════════════════════

# Writable hostPath — high risk (container escape to host filesystem)
apiVersion: v1
kind: Pod
metadata:
  name: log-collector
  namespace: monitoring
  labels:
    app: log-collector
spec:
  serviceAccountName: default
  containers:
    - name: collector
      image: fluentd:latest
      securityContext:
        capabilities:
          add: ["SYS_ADMIN", "DAC_READ_SEARCH"]
      volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: docker-sock
          mountPath: /var/run/docker.sock
  volumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
---
# Read-only hostPath — lower risk
apiVersion: v1
kind: Pod
metadata:
  name: metrics-exporter
  namespace: monitoring
  labels:
    app: metrics-exporter
spec:
  serviceAccountName: default
  containers:
    - name: exporter
      image: prom/node-exporter:latest
      volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
  volumes:
    - name: proc
      hostPath:
        path: /proc
    - name: sys
      hostPath:
        path: /sys
---

# ════════════════════════════════════════════════════════════════════════════
# CHAIN 10: MONITORING SA WITH BROAD READ (info disclosure)
# ════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitor-sa
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-reader
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitor-cluster-read
subjects:
  - kind: ServiceAccount
    name: monitor-sa
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: cluster-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: monitor-sa
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
---

