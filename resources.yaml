apiVersion: v1
kind: Namespace
metadata:
  name: attack-lab
---
# ======================
# Secrets (target)
# ======================
apiVersion: v1
kind: Secret
metadata:
  name: sensitive-secret
  namespace: attack-lab
type: Opaque
stringData:
  token: super-secret-token
---
# ======================
# ServiceAccounts
# ======================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: foothold-sa
  namespace: attack-lab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: privileged-sa
  namespace: attack-lab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-admin-sa
  namespace: attack-lab
---
# ======================
# RBAC - Secret access
# ======================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: attack-lab
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: foothold-secret-access
  namespace: attack-lab
subjects:
  - kind: ServiceAccount
    name: foothold-sa
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
---
# ======================
# RBAC - Pod exec (pivot)
# ======================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-exec-role
  namespace: attack-lab
rules:
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: foothold-pod-exec
  namespace: attack-lab
subjects:
  - kind: ServiceAccount
    name: foothold-sa
roleRef:
  kind: Role
  name: pod-exec-role
  apiGroup: rbac.authorization.k8s.io
---
# ======================
# Cluster-admin target
# ======================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-admin-binding
subjects:
  - kind: ServiceAccount
    name: cluster-admin-sa
    namespace: attack-lab
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
# ======================
# Privileged Pod (pivot target)
# ======================
apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
  namespace: attack-lab
spec:
  serviceAccountName: privileged-sa
  hostPID: true
  hostNetwork: true
  containers:
    - name: priv
      image: alpine
      command: ["/bin/sh", "-c", "sleep 36000"]
      securityContext:
        privileged: true
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
---
# ======================
# Foothold Pod (ENTRY POINT)
# ======================
apiVersion: v1
kind: Pod
metadata:
  name: foothold-pod
  namespace: attack-lab
spec:
  serviceAccountName: foothold-sa
  containers:
    - name: attacker
      image: alpine
      command: ["/bin/sh", "-c", "sleep 36000"]
